syntax = "proto3";

package jarvis;

service Jarvis {
  rpc SendMessage (MessageRequest) returns (MessageResponse);
}

message MessageRequest {
  string prompt = 1;
  string client_id = 2;
  string target = 3; // optional: "alice", "bob" — routes to actor instead of core
}

message MessageResponse {
  string result = 1;
  string session_id = 2;
}

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#44aaff" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#00e5b0" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0a1628" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="core" cx="40%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#88ccff"/>
      <stop offset="40%" stop-color="#44aaff"/>
      <stop offset="70%" stop-color="#2266aa"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </radialGradient>
    <radialGradient id="highlight" cx="35%" cy="35%" r="30%">
      <stop offset="0%" stop-color="white" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="#0a1628"/>
  <!-- Ambient glow -->
  <circle cx="256" cy="256" r="200" fill="url(#glow)"/>
  <!-- Halo ring -->
  <circle cx="256" cy="256" r="140" fill="none" stroke="#44aaff" stroke-width="1" opacity="0.15"/>
  <circle cx="256" cy="256" r="155" fill="none" stroke="#00e5b0" stroke-width="0.5" opacity="0.1"/>
  <!-- Primary orb -->
  <circle cx="256" cy="256" r="100" fill="url(#core)"/>
  <!-- Secondary orb (screen blend effect) -->
  <circle cx="256" cy="256" r="85" fill="#00e5b0" opacity="0.15"/>
  <!-- Core highlight -->
  <circle cx="240" cy="240" r="50" fill="url(#highlight)"/>
  <!-- Inner glow -->
  <circle cx="256" cy="256" r="100" fill="none" stroke="#44aaff" stroke-width="2" opacity="0.3"/>
</svg>
